<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>AI Avatar</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- החלון הראשי של האוואטר -->
  <div id="agent-overlay" class="agent-overlay active">

    <section
      id="agent-window"
      class="agent-window"
      aria-label="AI Assistant"
    >

      <!-- החלק העליון -->
      <header class="agent-header">

        <div class="agent-title-wrapper">
          <span class="agent-status-dot"></span>

          <div>
            <h2 id="agent-title">העוזר החכם שלי</h2>
            <p id="agent-status">מחובר ומוכן לשיחה</p>
          </div>
        </div>

        <button
          id="agent-close-btn"
          class="agent-close-btn"
          type="button"
          aria-label="סגירת האוואטר"
        >
          ×
        </button>

      </header>

      <!-- בחירת שפה -->
      <div class="language-selector">

        <button
          id="hebrew-btn"
          class="language-btn active"
          type="button"
          data-language="he-IL"
        >
          עברית
        </button>

        <button
          id="english-btn"
          class="language-btn"
          type="button"
          data-language="en-US"
        >
          English
        </button>

      </div>

      <!-- הריבוע הגדול של הסרטון -->
      <div id="agent-video-container" class="agent-video-container">

        <!-- כאן חייב להופיע הסרטון של D-ID -->
        <video
          id="agent-video"
          autoplay
          playsinline
        ></video>

        <!-- תמונת המתנה לפני שהסרטון מתחיל -->
        <div id="avatar-placeholder" class="avatar-placeholder">
          <div class="avatar-placeholder-circle">
            AI
          </div>

          <p id="placeholder-text">
            האוואטר מתחבר...
          </p>
        </div>

        <!-- טעינה -->
        <div id="agent-loader" class="agent-loader hidden">
          <span></span>
          <span></span>
          <span></span>
        </div>

        <!-- כתוביות -->
        <div
          id="agent-subtitle"
          class="agent-subtitle hidden"
          aria-live="polite"
        ></div>

      </div>

      <!-- אזור ההודעות -->
      <div class="agent-message-area">

        <p id="instruction-text">
          לחצי על המיקרופון ודברי עם האוואטר
        </p>

        <p id="recognized-text" class="recognized-text"></p>

      </div>

      <!-- כפתורי פעולה -->
      <div class="agent-controls">

        <button
          id="microphone-btn"
          class="microphone-btn"
          type="button"
          aria-label="התחלת שיחה"
        >
          <span id="microphone-icon">🎤</span>
          <span id="microphone-text">התחלת שיחה</span>
        </button>

      </div>

      <!-- הודעת שגיאה -->
      <div id="agent-error" class="agent-error hidden"></div>

    </section>

  </div>

  <!-- כפתור לפתיחה מחדש -->
  <button
    id="open-agent-btn"
    class="open-agent-btn hidden"
    type="button"
  >
    <span>🤖</span>
    <span id="open-agent-text">פתחי את העוזר החכם</span>
  </button>

  <script src="script.js"></script>

</body>
</html>
